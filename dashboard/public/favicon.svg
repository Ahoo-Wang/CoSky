<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="cosky-favicon-title cosky-favicon-desc">
  <title id="cosky-favicon-title">CoSky</title>
  <desc id="cosky-favicon-desc">CoSky microservice governance platform logo</desc>
  <defs>
    <linearGradient id="cosky-favicon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a67d8"/>
      <stop offset="50%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cosky-node-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Hexagon outer frame -->
  <polygon
    points="32,3 59,17.6 59,46.4 32,61 5,46.4 5,17.6"
    fill="none"
    stroke="url(#cosky-favicon-gradient)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Constellation network -->
  <g>
    <!-- Connection lines -->
    <g stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
      <line x1="32" y1="32" x2="32" y2="18"/>
      <line x1="32" y1="32" x2="44" y2="26"/>
      <line x1="32" y1="32" x2="44" y2="42"/>
      <line x1="32" y1="32" x2="32" y2="46"/>
      <line x1="32" y1="32" x2="20" y2="42"/>
      <line x1="32" y1="32" x2="20" y2="26"/>
      <line x1="32" y1="18" x2="44" y2="26"/>
      <line x1="44" y1="26" x2="44" y2="42"/>
      <line x1="44" y1="42" x2="32" y2="46"/>
      <line x1="32" y1="46" x2="20" y2="42"/>
      <line x1="20" y1="42" x2="20" y2="26"/>
      <line x1="20" y1="26" x2="32" y2="18"/>
    </g>

    <!-- Star nodes -->
    <circle cx="32" cy="32" r="6" fill="url(#cosky-node-glow)"/>
    <circle cx="32" cy="18" r="4" fill="url(#cosky-favicon-gradient)"/>
    <circle cx="44" cy="26" r="3" fill="url(#cosky-favicon-gradient)" opacity="0.9"/>
    <circle cx="44" cy="42" r="4" fill="url(#cosky-favicon-gradient)"/>
    <circle cx="32" cy="46" r="3" fill="url(#cosky-favicon-gradient)" opacity="0.9"/>
    <circle cx="20" cy="42" r="4" fill="url(#cosky-favicon-gradient)"/>
    <circle cx="20" cy="26" r="3" fill="url(#cosky-favicon-gradient)" opacity="0.9"/>

    <!-- Sparkle accents -->
    <g fill="#ffffff" opacity="0.8">
      <circle cx="28" cy="24" r="1"/>
      <circle cx="38" cy="36" r="0.8"/>
      <circle cx="25" cy="38" r="0.8"/>
      <circle cx="36" cy="28" r="0.9"/>
    </g>
  </g>
</svg>
