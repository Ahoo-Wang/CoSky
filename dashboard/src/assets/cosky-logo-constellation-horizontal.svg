<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-labelledby="cosky-title-h cosky-desc-h">
  <title id="cosky-title-h">CoSky Logo Horizontal</title>
  <desc id="cosky-desc-h">Hexagon constellation logo with wordmark</desc>
  <defs>
    <linearGradient id="cosky-gradient-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a67d8"/>
      <stop offset="50%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="star-glow-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
  </defs>

  <!-- Icon (48x48) -->
  <g transform="translate(6, 6)">
    <!-- Hexagon outer frame -->
    <polygon
      points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5"
      fill="none"
      stroke="url(#cosky-gradient-h)"
      stroke-width="3"
      stroke-linejoin="round"
      transform="scale(0.48) translate(0, 0)"
    />

    <!-- Constellation network -->
    <g transform="scale(0.48)">
      <!-- Connection lines -->
      <g stroke="url(#cosky-gradient-h)" stroke-width="2" stroke-linecap="round" opacity="0.6">
        <line x1="50" y1="50" x2="50" y2="28"/>
        <line x1="50" y1="50" x2="70" y2="40"/>
        <line x1="50" y1="50" x2="70" y2="65"/>
        <line x1="50" y1="50" x2="50" y2="72"/>
        <line x1="50" y1="50" x2="30" y2="65"/>
        <line x1="50" y1="50" x2="30" y2="40"/>
        <line x1="50" y1="28" x2="70" y2="40"/>
        <line x1="70" y1="40" x2="70" y2="65"/>
        <line x1="70" y1="65" x2="50" y2="72"/>
        <line x1="50" y1="72" x2="30" y2="65"/>
        <line x1="30" y1="65" x2="30" y2="40"/>
        <line x1="30" y1="40" x2="50" y2="28"/>
      </g>

      <!-- Star nodes -->
      <circle cx="50" cy="50" r="8" fill="url(#star-glow-h)"/>
      <circle cx="50" cy="28" r="5" fill="url(#cosky-gradient-h)"/>
      <circle cx="70" cy="40" r="4" fill="url(#cosky-gradient-h)" opacity="0.9"/>
      <circle cx="70" cy="65" r="5" fill="url(#cosky-gradient-h)"/>
      <circle cx="50" cy="72" r="4" fill="url(#cosky-gradient-h)" opacity="0.9"/>
      <circle cx="30" cy="65" r="5" fill="url(#cosky-gradient-h)"/>
      <circle cx="30" cy="40" r="4" fill="url(#cosky-gradient-h)" opacity="0.9"/>

      <!-- Accent dots -->
      <g fill="#a78bfa" opacity="0.7">
        <circle cx="45" cy="35" r="1.5"/>
        <circle cx="62" cy="55" r="1"/>
        <circle cx="38" cy="58" r="1"/>
        <circle cx="58" cy="42" r="1.2"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(70, 0)">
    <text
      x="0"
      y="38"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="28"
      font-weight="700"
      fill="url(#cosky-gradient-h)"
      letter-spacing="0.5"
    >
      CoSky
    </text>
    <text
      x="0"
      y="54"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="11"
      font-weight="400"
      fill="#667eea"
      letter-spacing="1"
    >
      MICROSERVICE GOVERNANCE
    </text>
  </g>
</svg>
