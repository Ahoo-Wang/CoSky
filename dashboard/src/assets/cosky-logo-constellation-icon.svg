<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="cosky-icon-title cosky-icon-desc">
  <title id="cosky-icon-title">CoSky Icon</title>
  <desc id="cosky-icon-desc">CoSky hexagon constellation icon for small sizes</desc>
  <defs>
    <linearGradient id="cosky-gradient-i" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a67d8"/>
      <stop offset="50%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="star-glow-i" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
  </defs>

  <!-- Hexagon outer frame -->
  <polygon
    points="32,3 59,17.6 59,46.4 32,61 5,46.4 5,17.6"
    fill="none"
    stroke="url(#cosky-gradient-i)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Constellation network -->
  <g>
    <!-- Connection lines -->
    <g stroke="url(#cosky-gradient-i)" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <line x1="32" y1="32" x2="32" y2="18"/>
      <line x1="32" y1="32" x2="44" y2="26"/>
      <line x1="32" y1="32" x2="44" y2="42"/>
      <line x1="32" y1="32" x2="32" y2="46"/>
      <line x1="32" y1="32" x2="20" y2="42"/>
      <line x1="32" y1="32" x2="20" y2="26"/>
      <line x1="32" y1="18" x2="44" y2="26"/>
      <line x1="44" y1="26" x2="44" y2="42"/>
      <line x1="44" y1="42" x2="32" y2="46"/>
      <line x1="32" y1="46" x2="20" y2="42"/>
      <line x1="20" y1="42" x2="20" y2="26"/>
      <line x1="20" y1="26" x2="32" y2="18"/>
    </g>

    <!-- Star nodes -->
    <circle cx="32" cy="32" r="5" fill="url(#star-glow-i)"/>
    <circle cx="32" cy="18" r="3.5" fill="url(#cosky-gradient-i)"/>
    <circle cx="44" cy="26" r="2.8" fill="url(#cosky-gradient-i)" opacity="0.9"/>
    <circle cx="44" cy="42" r="3.5" fill="url(#cosky-gradient-i)"/>
    <circle cx="32" cy="46" r="2.8" fill="url(#cosky-gradient-i)" opacity="0.9"/>
    <circle cx="20" cy="42" r="3.5" fill="url(#cosky-gradient-i)"/>
    <circle cx="20" cy="26" r="2.8" fill="url(#cosky-gradient-i)" opacity="0.9"/>

    <!-- Accent dots -->
    <g fill="#a78bfa" opacity="0.7">
      <circle cx="28" cy="24" r="1"/>
      <circle cx="38" cy="36" r="0.8"/>
      <circle cx="25" cy="38" r="0.8"/>
      <circle cx="36" cy="28" r="0.9"/>
    </g>
  </g>
</svg>
